<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kenny's Client Book — Wellcare</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <h1><span class="brand-icon" data-icon="folder"></span> Client Book</h1>
      <p class="subtitle" id="login-subtitle">Sign in to manage your clients</p>
      <form id="login-form">
        <label id="login-password-label">Password</label>
        <input type="password" id="login-password" required autocomplete="current-password" />
        <div id="login-confirm-wrap" class="hidden">
          <label>Confirm Password</label>
          <input type="password" id="login-password-confirm" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-block"><span class="icon-slot" data-icon="key"></span> <span id="login-submit-label">Sign In</span></button>
        <p id="login-error" class="error-text"></p>
      </form>
    </div>
  </div>

  <!-- Catches script/module load failures (e.g. blocked network) that
       would otherwise fail silently with no visible error. -->
  <script>
    function showBootError(msg) {
      var el = document.getElementById("login-error");
      if (el) el.textContent = "Startup error: " + msg;
      console.error("Boot error:", msg);
    }
    window.addEventListener("error", function (e) {
      showBootError(e.message || String(e.error));
    });
    window.addEventListener("unhandledrejection", function (e) {
      showBootError((e.reason && e.reason.message) || String(e.reason));
    });
  </script>

  <!-- APP SHELL -->
  <div id="app" class="app hidden">
    <nav class="sidebar">
      <div class="brand"><span class="brand-icon" data-icon="folder"></span> Client Book</div>
      <button type="button" id="global-search-trigger" class="search-trigger">
        <span class="icon-slot" data-icon="search"></span>
        <span class="search-trigger-label">Search</span>
        <span class="search-trigger-kbd"><span class="icon-slot" data-icon="command"></span>K</span>
      </button>
      <button type="button" id="notif-bell-trigger" class="search-trigger">
        <span class="icon-slot" data-icon="bell"></span>
        <span class="search-trigger-label">Notifications</span>
        <span class="notif-badge hidden" id="notif-badge">0</span>
      </button>
      <a href="#/dashboard" class="nav-link" data-route="dashboard">
        <span class="nav-icon" data-icon="dashboard"></span>
        Dashboard
      </a>
      <a href="#/clients" class="nav-link" data-route="clients">
        <span class="nav-icon" data-icon="clients"></span>
        Clients
      </a>
      <a href="#/clients/new" class="nav-link" data-route="new-client">
        <span class="nav-icon" data-icon="add-client"></span>
        Add Client
      </a>
      <a href="#/tasks" class="nav-link" data-route="tasks">
        <span class="nav-icon" data-icon="tasks"></span>
        Tasks
      </a>
      <a href="#/commissions" class="nav-link" data-route="commissions">
        <span class="nav-icon" data-icon="commissions"></span>
        Commissions
      </a>
      <a href="#/reports" class="nav-link" data-route="reports">
        <span class="nav-icon" data-icon="chart"></span>
        Reports
      </a>
      <div class="sidebar-spacer"></div>
      <div class="user-email" id="user-email"></div>
      <button id="logout-btn" class="btn btn-ghost btn-block"><span class="icon-slot" data-icon="logout"></span> Sign Out</button>
    </nav>
    <main class="content" id="content">
      <!-- Views render here -->
    </main>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Global search (Ctrl+K) -->
  <div id="global-search-overlay" class="search-overlay hidden">
    <div class="search-modal">
      <div class="search-modal-input-row">
        <span class="icon-slot" data-icon="search"></span>
        <input type="text" id="global-search-input" placeholder="Search clients, tasks, interactions..." autocomplete="off" />
        <button type="button" id="global-search-close" class="search-modal-close">
          <span class="icon-slot" data-icon="close"></span>
        </button>
      </div>
      <div id="global-search-results" class="search-results"></div>
    </div>
  </div>

  <!-- Notification panel -->
  <div id="notif-panel-overlay" class="search-overlay hidden">
    <div class="search-modal">
      <div class="search-modal-input-row">
        <span class="icon-slot" data-icon="bell"></span>
        <div class="notif-panel-title">Notifications</div>
        <button type="button" id="notif-panel-close" class="search-modal-close">
          <span class="icon-slot" data-icon="close"></span>
        </button>
      </div>
      <div id="notif-panel-results" class="search-results"></div>
    </div>
  </div>

  <!-- TEMPLATES -->
  <template id="tpl-dashboard">
    <div class="view-header">
      <h2><span class="icon-slot" data-icon="dashboard"></span> Dashboard</h2>
      <div class="today-label" id="today-label"></div>
    </div>
    <div class="dash-grid">
      <section class="card">
        <h3><span class="icon-slot" data-icon="renewal-due"></span> Follow-ups Due (today &amp; overdue)</h3>
        <div id="dash-followups" class="list"></div>
      </section>
      <section class="card">
        <h3><span class="icon-slot" data-icon="calendar"></span> Renewals — Next 90 Days</h3>
        <div id="dash-renewals" class="list"></div>
      </section>
      <section class="card">
        <h3><span class="icon-slot" data-icon="tasks"></span> Tasks Due (today &amp; overdue)</h3>
        <div id="dash-tasks" class="list"></div>
      </section>
    </div>
    <section class="card">
      <h3><span class="icon-slot" data-icon="chart"></span> Quick Stats</h3>
      <div class="stats-row" id="dash-stats"></div>
    </section>
  </template>

  <template id="tpl-clients">
    <div class="view-header">
      <h2><span class="icon-slot" data-icon="clients"></span> Clients</h2>
      <div class="view-header-actions">
        <div class="view-toggle" id="clients-view-toggle">
          <button type="button" data-view="table" class="active"><span class="icon-slot" data-icon="table"></span> Table</button>
          <button type="button" data-view="board"><span class="icon-slot" data-icon="board"></span> Board</button>
        </div>
        <a href="#/clients/new" class="btn btn-primary"><span class="icon-slot" data-icon="plus"></span> Add Client</a>
      </div>
    </div>
    <div class="toolbar">
      <div class="search-wrap">
        <span class="icon-slot" data-icon="search"></span>
        <input type="text" id="client-search" placeholder="Search by name, phone, email..." />
      </div>
      <select id="status-filter">
        <option value="">All statuses</option>
      </select>
    </div>
    <div class="toolbar toolbar-filters">
      <span class="icon-slot toolbar-filter-icon" data-icon="filter"></span>
      <input type="text" id="carrier-filter" placeholder="Carrier..." class="filter-input" />
      <select id="lob-filter">
        <option value="">All lines of business</option>
      </select>
      <label class="filter-date-label">Renewal from <input type="date" id="renewal-from-filter" /></label>
      <label class="filter-date-label">to <input type="date" id="renewal-to-filter" /></label>
      <button type="button" id="clear-filters-btn" class="btn btn-ghost btn-sm hidden">
        <span class="icon-slot" data-icon="close"></span> Clear filters
      </button>
    </div>
    <div class="table-wrap">
      <table class="data-table" id="clients-table">
        <thead>
          <tr>
            <th class="sortable" data-sort="fullName">Name<span class="sort-icon-slot"></span></th>
            <th class="sortable" data-sort="status">Status<span class="sort-icon-slot"></span></th>
            <th class="sortable" data-sort="lineOfBusiness">Line of Business<span class="sort-icon-slot"></span></th>
            <th class="sortable" data-sort="renewalDate">Renewal<span class="sort-icon-slot"></span></th>
            <th class="sortable" data-sort="phone">Phone<span class="sort-icon-slot"></span></th>
            <th class="sortable" data-sort="lastContact">Last Contact<span class="sort-icon-slot"></span></th>
          </tr>
        </thead>
        <tbody id="clients-tbody"></tbody>
      </table>
    </div>
    <div class="board-wrap hidden" id="clients-board-wrap">
      <div class="board" id="clients-board"></div>
    </div>
  </template>

  <datalist id="carrier-list">
    <option value="Intact Insurance">
    <option value="Aviva Canada">
    <option value="Economical Insurance">
    <option value="Definity (Sonnet/Family/Travelers)">
    <option value="Wawanesa">
    <option value="Gore Mutual">
    <option value="Travelers Canada">
    <option value="TD Insurance">
    <option value="Desjardins">
    <option value="RSA / Intact">
    <option value="Pembridge">
    <option value="Chubb">
    <option value="Northbridge">
    <option value="Co-operators">
  </datalist>

  <datalist id="referral-list">
    <option value="Existing Client Referral">
    <option value="Family/Friend">
    <option value="Website">
    <option value="Google Search">
    <option value="Social Media">
    <option value="Walk-in">
    <option value="Cold Call">
    <option value="Self">
  </datalist>

  <template id="tpl-client-form">
    <div class="view-header">
      <h2><span class="icon-slot" data-icon="edit"></span> <span id="client-form-title">Add Client</span></h2>
    </div>
    <form id="client-form" class="form-card">
      <div class="form-grid">
        <div class="field">
          <label>Full Name *</label>
          <input type="text" id="f-fullName" required />
        </div>
        <div class="field">
          <label>Status</label>
          <select id="f-status"></select>
        </div>
        <div class="field">
          <label>Phone</label>
          <input type="tel" id="f-phone" placeholder="(416) 555-0123" data-format="phone" />
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="f-email" />
        </div>
        <div class="field field-wide">
          <label>Line(s) of Business</label>
          <div class="checkbox-group" id="f-lob-group"></div>
          <input type="text" id="f-lob-other" class="hidden" placeholder="Describe other line of business" style="margin-top:8px;" />
        </div>
        <div class="field">
          <label>Carrier</label>
          <input type="text" id="f-carrier" list="carrier-list" placeholder="Start typing or pick one" />
        </div>
        <div class="field">
          <label>Renewal Date</label>
          <input type="date" id="f-renewalDate" />
        </div>
        <div class="field">
          <label>Referral Source</label>
          <input type="text" id="f-referralSource" list="referral-list" placeholder="Who referred them / self" />
        </div>
      </div>
      <div class="field">
        <label>Household Notes</label>
        <textarea id="f-notes" rows="3" placeholder="e.g. teen driver added 2027, considering umbrella policy"></textarea>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary"><span class="icon-slot" data-icon="save"></span> Save Client</button>
        <a href="#/clients" class="btn btn-ghost">Cancel</a>
        <button type="button" id="delete-client-btn" class="btn btn-danger hidden"><span class="icon-slot" data-icon="trash"></span> Delete Client</button>
      </div>
    </form>
  </template>

  <template id="tpl-client-detail">
    <div class="view-header">
      <div>
        <h2 id="detail-name"></h2>
        <span class="badge" id="detail-status"></span>
      </div>
      <div>
        <a href="#" id="edit-client-link" class="btn btn-ghost"><span class="icon-slot" data-icon="edit"></span> Edit</a>
      </div>
    </div>

    <div class="detail-grid">
      <section class="card">
        <h3><span class="icon-slot" data-icon="info-circle"></span> Client Info</h3>
        <dl class="info-list" id="detail-info"></dl>
      </section>

      <section class="card">
        <h3><span class="icon-slot" data-icon="note"></span> Log an Interaction</h3>
        <form id="interaction-form" class="form-card">
          <div class="form-grid">
            <div class="field">
              <label>Type</label>
              <select id="i-type">
                <option value="Call">Call</option>
                <option value="Quote">Quote</option>
                <option value="Email">Email</option>
                <option value="Meeting">Meeting</option>
                <option value="Note">Note</option>
                <option value="Bind">Bind</option>
                <option value="DASH Report">DASH Report</option>
              </select>
            </div>
            <div class="field">
              <label>Date</label>
              <input type="date" id="i-date" required />
            </div>
            <div class="field" id="i-quote-amount-wrap">
              <label>Quote Amount ($)</label>
              <input type="text" inputmode="decimal" id="i-quoteAmount" data-format="currency" />
            </div>
            <div class="field" id="i-quote-lob-wrap">
              <label>Line of Business</label>
              <select id="i-quoteLOB">
                <option value="">— Select —</option>
                <option value="Auto">Auto</option>
                <option value="Home">Home</option>
                <option value="Auto + Home Bundle">Auto + Home Bundle</option>
                <option value="Tenant">Tenant</option>
                <option value="Condo">Condo</option>
                <option value="Business/Commercial">Business/Commercial</option>
                <option value="Umbrella">Umbrella</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="field" id="i-premium-wrap">
              <label>Premium Amount ($)</label>
              <input type="text" inputmode="decimal" id="i-premiumAmount" data-format="currency" />
            </div>
            <div class="field" id="i-commission-rate-wrap">
              <label>Commission Rate (%)</label>
              <input type="number" id="i-commissionRate" step="0.01" />
            </div>
            <div class="field" id="i-commission-amount-wrap">
              <label>Commission Amount ($) — auto, editable</label>
              <input type="text" inputmode="decimal" id="i-commissionAmount" data-format="currency" />
            </div>
            <div class="field">
              <label>Next Follow-up Date</label>
              <input type="date" id="i-followUpDate" />
            </div>
          </div>
          <div class="field">
            <label>Summary / Notes *</label>
            <textarea id="i-summary" rows="2" required placeholder="What happened / what was discussed"></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary"><span class="icon-slot" data-icon="plus"></span> Add to Timeline</button>
          </div>
        </form>
      </section>
    </div>

    <section class="card">
      <h3><span class="icon-slot" data-icon="attachment"></span> Documents</h3>
      <form id="document-form" class="doc-upload-row">
        <select id="doc-category"></select>
        <input type="file" id="doc-file" accept="image/*,.pdf" required />
        <button type="submit" class="btn btn-primary"><span class="icon-slot" data-icon="upload"></span> Upload</button>
      </form>
      <div id="doc-upload-status" class="upload-status"></div>
      <div id="documents-grid" class="documents-grid"></div>
    </section>

    <section class="card">
      <h3><span class="icon-slot" data-icon="renewal-due"></span> Timeline</h3>
      <div id="detail-timeline" class="timeline"></div>
    </section>
  </template>

  <template id="tpl-tasks">
    <div class="view-header">
      <h2><span class="icon-slot" data-icon="tasks"></span> Tasks</h2>
    </div>
    <section class="card">
      <h3><span class="icon-slot" data-icon="plus"></span> Add a Task</h3>
      <form id="task-form" class="form-card">
        <div class="form-grid">
          <div class="field">
            <label>Title *</label>
            <input type="text" id="t-title" required placeholder="e.g. Submit endorsement request" />
          </div>
          <div class="field">
            <label>Due Date</label>
            <input type="date" id="t-dueDate" />
          </div>
          <div class="field">
            <label>Linked Client (optional)</label>
            <select id="t-clientId">
              <option value="">— None —</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Notes</label>
          <textarea id="t-notes" rows="2"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary"><span class="icon-slot" data-icon="plus"></span> Add Task</button>
        </div>
      </form>
    </section>
    <section class="card">
      <h3><span class="icon-slot" data-icon="circle-dot"></span> Open Tasks</h3>
      <div id="tasks-open-list" class="list" style="max-height:none;"></div>
    </section>
    <section class="card">
      <h3><span class="icon-slot" data-icon="check-circle"></span> Completed</h3>
      <div id="tasks-done-list" class="list" style="max-height:none;"></div>
    </section>
  </template>

  <template id="tpl-commissions">
    <div class="view-header">
      <h2><span class="icon-slot" data-icon="commissions"></span> Commissions</h2>
    </div>
    <section class="card">
      <h3><span class="icon-slot" data-icon="chart"></span> Summary</h3>
      <div class="stats-row" id="comm-stats"></div>
    </section>
    <section class="card">
      <h3><span class="icon-slot" data-icon="bound"></span> Bound Policies</h3>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr><th>Date</th><th>Client</th><th>Line of Business</th><th>Premium</th><th>Rate</th><th>Commission</th></tr>
          </thead>
          <tbody id="comm-tbody"></tbody>
        </table>
      </div>
    </section>
  </template>

  <template id="tpl-reports">
    <div class="view-header">
      <h2><span class="icon-slot" data-icon="chart"></span> Reports</h2>
    </div>
    <div class="reports-grid">
      <section class="card">
        <h3><span class="icon-slot" data-icon="commissions"></span> Commission &amp; Premium Trend (last 6 months)</h3>
        <div id="report-commission-chart"></div>
        <div id="report-premium-chart" style="margin-top:16px;"></div>
      </section>
      <section class="card">
        <h3><span class="icon-slot" data-icon="clients"></span> Pipeline Conversion</h3>
        <div class="chart-stat-row" id="report-conversion-stats"></div>
        <div id="report-pipeline-chart"></div>
      </section>
      <section class="card">
        <h3><span class="icon-slot" data-icon="referral-source"></span> Referral Source Performance</h3>
        <div id="report-referral-chart"></div>
      </section>
      <section class="card">
        <h3><span class="icon-slot" data-icon="note"></span> Activity Overview (last 6 weeks)</h3>
        <div id="report-activity-chart"></div>
      </section>
    </div>
  </template>

  <template id="tpl-spinner">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </template>

  <script type="module" src="app.js"></script>
</body>
</html>
